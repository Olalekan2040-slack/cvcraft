databases:
  - name: cvcraft-db
    databaseName: cvcraft
    user: cvcraft

services:
  - type: web
    name: cvcraft
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn cvcraft.wsgi --workers 2 --threads 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: cvcraft.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.13.3"
      - key: DATABASE_URL
        fromDatabase:
          name: cvcraft-db
          property: connectionString
