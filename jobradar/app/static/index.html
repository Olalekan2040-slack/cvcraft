<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobRadar · N-TECH Info Systems</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #273549;
            --border: #334155;
            --accent: #3b82f6;
            --accent-h: #2563eb;
            --ok: #22c55e;
            --err: #ef4444;
            --warn: #f59e0b;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --sw: 224px
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh
        }

        /* ── Login ── */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 30%, #1e3a5f 0%, var(--bg) 60%)
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5)
        }

        .login-logo {
            font-size: 2.5rem;
            margin-bottom: 8px
        }

        .login-card h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px
        }

        .login-card .sub {
            color: var(--muted);
            font-size: 0.8rem;
            margin-bottom: 28px
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 7px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--muted);
            transition: .15s
        }

        .tab.active {
            background: var(--accent);
            color: #fff
        }

        .fg {
            margin-bottom: 14px
        }

        .fg label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 5px
        }

        .fg input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-size: .9rem;
            outline: none;
            transition: .15s
        }

        .fg input:focus {
            border-color: var(--accent)
        }

        .auth-err {
            color: #fca5a5;
            font-size: .82rem;
            margin-bottom: 10px;
            display: none
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 16px;
            border-radius: 8px;
            border: none;
            font-size: .85rem;
            cursor: pointer;
            font-weight: 500;
            transition: .15s;
            text-decoration: none
        }

        .btn-primary {
            background: var(--accent);
            color: #fff
        }

        .btn-primary:hover {
            background: var(--accent-h)
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: .78rem
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border)
        }

        .btn-ghost:hover {
            color: var(--text);
            background: var(--surface2)
        }

        .btn-success {
            background: #14532d;
            color: #86efac
        }

        .btn-full {
            width: 100%;
            justify-content: center
        }

        /* ── App shell ── */
        #app {
            display: none;
            height: 100vh;
            overflow: hidden
        }

        #app.show {
            display: flex
        }

        /* Sidebar */
        .sidebar {
            width: var(--sw);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0
        }

        .brand {
            padding: 18px 16px 14px;
            border-bottom: 1px solid var(--border)
        }

        .brand-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent)
        }

        .brand-org {
            font-size: .68rem;
            color: var(--muted);
            margin-top: 2px
        }

        .sidebar-nav {
            flex: 1;
            padding: 10px 8px;
            overflow-y: auto
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: .87rem;
            color: var(--muted);
            transition: .15s;
            margin-bottom: 2px;
            user-select: none
        }

        .nav-item:hover {
            background: var(--surface2);
            color: var(--text)
        }

        .nav-item.active {
            background: var(--accent);
            color: #fff
        }

        .nav-icon {
            width: 20px;
            text-align: center;
            font-size: .95rem
        }

        .sidebar-foot {
            padding: 12px;
            border-top: 1px solid var(--border)
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .78rem;
            font-weight: 700;
            flex-shrink: 0
        }

        .uname {
            font-size: .83rem;
            font-weight: 600
        }

        .urole {
            font-size: .68rem;
            color: var(--muted)
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden
        }

        .topbar {
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            flex-shrink: 0
        }

        .topbar h2 {
            font-size: 1rem;
            font-weight: 600
        }

        .topbar-right {
            display: flex;
            gap: 8px;
            align-items: center
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 22px
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr));
            gap: 14px;
            margin-bottom: 22px
        }

        .stat {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 16px;
            position: relative;
            overflow: hidden
        }

        .stat::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent)
        }

        .stat.g::before {
            background: var(--ok)
        }

        .stat.a::before {
            background: var(--warn)
        }

        .stat.r::before {
            background: var(--err)
        }

        .stat-val {
            font-size: 1.9rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 5px
        }

        .stat-lbl {
            font-size: .75rem;
            color: var(--muted)
        }

        .stat-ico {
            position: absolute;
            top: 14px;
            right: 14px;
            font-size: 1.3rem;
            opacity: .35
        }

        /* Section */
        .sec-title {
            font-size: .78rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: 10px
        }

        /* Table */
        .tw {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px
        }

        .tb-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap
        }

        table {
            width: 100%;
            border-collapse: collapse
        }

        th {
            padding: 10px 14px;
            text-align: left;
            font-size: .72rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .05em;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
            white-space: nowrap
        }

        td {
            padding: 10px 14px;
            font-size: .84rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle
        }

        tr:last-child td {
            border-bottom: none
        }

        tr:hover td {
            background: rgba(255, 255, 255, .02)
        }

        .search {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 12px;
            color: var(--text);
            font-size: .83rem;
            outline: none;
            width: 210px
        }

        .search:focus {
            border-color: var(--accent)
        }

        /* Badges */
        .b {
            display: inline-block;
            padding: 2px 9px;
            border-radius: 999px;
            font-size: .72rem;
            font-weight: 600;
            white-space: nowrap
        }

        .b-sent {
            background: #14532d;
            color: #86efac
        }

        .b-failed {
            background: #7f1d1d;
            color: #fca5a5
        }

        .b-pending {
            background: #713f12;
            color: #fde68a
        }

        .b-on {
            background: #1e3a5f;
            color: #93c5fd
        }

        .b-off {
            background: var(--surface2);
            color: var(--muted)
        }

        .b-cat {
            background: var(--surface2);
            color: var(--accent);
            border: 1px solid var(--border);
            font-size: .7rem
        }

        /* Toast */
        #toasts {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .toast {
            padding: 11px 15px;
            border-radius: 8px;
            font-size: .83rem;
            font-weight: 500;
            animation: tin .3s ease;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .4);
            max-width: 300px
        }

        .t-ok {
            background: #14532d;
            color: #86efac;
            border-left: 4px solid var(--ok)
        }

        .t-err {
            background: #7f1d1d;
            color: #fca5a5;
            border-left: 4px solid var(--err)
        }

        .t-info {
            background: #1e3a5f;
            color: #93c5fd;
            border-left: 4px solid var(--accent)
        }

        @keyframes tin {
            from {
                transform: translateX(110%);
                opacity: 0
            }

            to {
                transform: none;
                opacity: 1
            }
        }

        /* Modal */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            z-index: 1000;
            align-items: center;
            justify-content: center
        }

        .overlay.open {
            display: flex
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 700px;
            max-height: 82vh;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        .modal-hd {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .modal-hd h3 {
            font-size: .95rem;
            font-weight: 600
        }

        .mclose {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px
        }

        .mclose:hover {
            color: var(--text)
        }

        .modal-bd {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            font-size: .84rem;
            line-height: 1.7
        }

        /* Scrape page */
        .scrape-wrap {
            max-width: 540px;
            margin: 0 auto
        }

        .scrape-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 36px;
            text-align: center;
            margin-bottom: 20px
        }

        .scrape-card h3 {
            font-size: 1.2rem;
            margin-bottom: 8px
        }

        .scrape-card p {
            color: var(--muted);
            font-size: .88rem;
            margin-bottom: 20px;
            line-height: 1.6
        }

        #scrape-status {
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: .84rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 46px;
            margin-top: 14px
        }

        .spin {
            width: 15px;
            height: 15px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: rot .7s linear infinite;
            flex-shrink: 0
        }

        @keyframes rot {
            to {
                transform: rotate(360deg)
            }
        }

        /* Steps list */
        .steps {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .step {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 11px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 9px;
            font-size: .84rem
        }

        .step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: .72rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px
        }

        /* Toggle */
        .toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: pointer
        }

        .toggle input {
            opacity: 0;
            width: 0;
            position: absolute
        }

        .tog-sl {
            width: 36px;
            height: 20px;
            background: var(--border);
            border-radius: 999px;
            transition: .2s;
            position: relative;
            flex-shrink: 0
        }

        .tog-sl::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            transition: .2s
        }

        .toggle input:checked+.tog-sl {
            background: var(--ok)
        }

        .toggle input:checked+.tog-sl::after {
            transform: translateX(16px)
        }

        /* Empty */
        .empty {
            text-align: center;
            padding: 48px;
            color: var(--muted)
        }

        .empty .ei {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: .4
        }

        /* Misc */
        a.jl {
            color: var(--accent);
            text-decoration: none;
            font-size: .78rem
        }

        a.jl:hover {
            text-decoration: underline
        }

        .trunc {
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block
        }

        .tabs2 {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: 8px;
            padding: 4px
        }

        .tp {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: .83rem;
            cursor: pointer;
            color: var(--muted);
            transition: .15s
        }

        .tp.act {
            background: var(--accent);
            color: #fff
        }

        .tp:hover:not(.act) {
            color: var(--text);
            background: var(--surface2)
        }

        .tpl-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px
        }

        .tpl-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            border-top: 3px solid var(--accent)
        }

        .inline-inp {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 3px 4px;
            width: 100%;
            font-size: .83rem;
            color: var(--text);
            outline: none
        }

        .inline-inp:focus {
            border-bottom-color: var(--accent)
        }

        .ir {
            display: flex;
            gap: 8px;
            align-items: baseline;
            margin-bottom: 5px;
            font-size: .83rem
        }

        .ir .lbl {
            color: var(--muted);
            min-width: 80px;
            font-size: .76rem
        }

        .prev-frame {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-size: .83rem;
            line-height: 1.7;
            max-height: 420px;
            overflow-y: auto
        }
    </style>
</head>

<body>
    <div id="toasts"></div>

    <!-- Login -->
    <div id="login-screen">
        <div class="login-card">
            <div class="login-logo">🎯</div>
            <h1>JobRadar</h1>
            <div class="sub">N-TECH Info Systems Ltd — Automated Job Outreach</div>
            <div class="tabs">
                <div class="tab active" id="tab-in" onclick="authMode('login')">Sign In</div>
                <div class="tab" id="tab-reg" onclick="authMode('register')">Register</div>
            </div>
            <div class="fg"><label>Username</label><input id="au" placeholder="Username" /></div>
            <div class="fg"><label>Password</label><input id="ap" type="password" placeholder="Password"
                    onkeydown="if(event.key==='Enter')doAuth()" /></div>
            <div class="auth-err" id="aerr"></div>
            <button class="btn btn-primary btn-full" onclick="doAuth()" id="auth-btn">Sign In →</button>
        </div>
    </div>

    <!-- Template modal -->
    <div class="overlay" id="tpl-modal" onclick="if(event.target===this)closeMod()">
        <div class="modal">
            <div class="modal-hd">
                <h3 id="mod-name">Template</h3>
                <button class="mclose" onclick="closeMod()">✕</button>
            </div>
            <div class="modal-bd" id="mod-body"></div>
        </div>
    </div>

    <!-- Change Password modal -->
    <div class="overlay" id="chpw-modal" onclick="if(event.target===this)closeChPw()">
        <div class="modal" style="width:420px;max-width:95vw">
            <div class="modal-hd">
                <h3>Change Password</h3>
                <button class="mclose" onclick="closeChPw()">✕</button>
            </div>
            <div class="modal-bd">
                <div class="fg" style="margin-bottom:14px">
                    <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px">Current
                        Password</label>
                    <input id="chpw-cur" type="password" placeholder="Current password"
                        style="width:100%;box-sizing:border-box" />
                </div>
                <div class="fg" style="margin-bottom:14px">
                    <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px">New
                        Password</label>
                    <input id="chpw-new" type="password" placeholder="New password (min 8 chars)"
                        style="width:100%;box-sizing:border-box" />
                </div>
                <div class="fg" style="margin-bottom:20px">
                    <label style="font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px">Confirm New
                        Password</label>
                    <input id="chpw-con" type="password" placeholder="Confirm new password"
                        style="width:100%;box-sizing:border-box" />
                </div>
                <div id="chpw-err" style="color:#f87171;font-size:.8rem;margin-bottom:12px;display:none"></div>
                <button class="btn btn-primary" style="width:100%" onclick="submitChPw()">Update Password</button>
            </div>
        </div>
    </div>

    <!-- App -->
    <div id="app">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-name">🎯 JobRadar</div>
                <div class="brand-org">N-TECH Info Systems Ltd</div>
            </div>
            <nav class="sidebar-nav" id="nav">
                <div class="nav-item active" data-p="dash" onclick="go('dash')"><span
                        class="nav-icon">📊</span>Dashboard</div>
                <div class="nav-item" data-p="jobs" onclick="go('jobs')"><span class="nav-icon">💼</span>Jobs Found
                </div>
                <div class="nav-item" data-p="apps" onclick="go('apps')"><span class="nav-icon">📨</span>Applications
                </div>
                <div class="nav-item" data-p="sources" onclick="go('sources')"><span class="nav-icon">🌐</span>Sources
                </div>
                <div class="nav-item" data-p="tpls" onclick="go('tpls')"><span class="nav-icon">📝</span>Templates</div>
                <div class="nav-item" data-p="scrape" onclick="go('scrape')"><span class="nav-icon">▶️</span>Run Scrape
                </div>
                <div class="nav-item" data-p="logs" onclick="go('logs')"><span class="nav-icon">📋</span>Scrape Logs
                </div>
                <div class="nav-item" data-p="school" onclick="go('school')"><span class="nav-icon">🏫</span>School
                    Outreach</div>
            </nav>
            <div class="sidebar-foot">
                <div class="user-row">
                    <div class="avatar" id="av">SQ</div>
                    <div>
                        <div class="uname" id="uname">Sharafdeen</div>
                        <div class="urole">Operator</div>
                    </div>
                </div>
                <button class="btn btn-ghost btn-full" style="margin-top:6px" onclick="openChPw()">🔑 Change
                    Password</button>
                <button class="btn btn-ghost btn-full" style="margin-top:6px" onclick="logout()">Sign Out</button>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <h2 id="ptitle">Dashboard</h2>
                <div class="topbar-right" id="tbar"></div>
            </div>
            <div class="content" id="pg">
                <div class="empty">
                    <div class="spin"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // ── State ──────────────────────────────────────────────────────────────────
        const S = {
            token: localStorage.getItem('jr_tok'),
            user: localStorage.getItem('jr_user') || '',
            mode: 'login',
        };

        // ── API ────────────────────────────────────────────────────────────────────
        async function api(path, opts = {}) {
            const h = { 'Content-Type': 'application/json' };
            if (S.token) h['Authorization'] = `Bearer ${S.token}`;
            const r = await fetch(path, { headers: h, ...opts });
            if (r.status === 401) { logout(); return null; }
            if (!r.ok) {
                const e = await r.json().catch(() => ({ detail: r.statusText }));
                throw new Error(e.detail || r.statusText);
            }
            return r.json();
        }

                const form = new URLSearchParams({ username: u, password: p });
                const r = await fetch('/auth/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: form });
                if (!r.ok) throw new Error('Invalid credentials');
                const d = await r.json();

            { school_name: "Preston International School", location: "Akure, Ondo", email: "office@preston-international.com" },
            { school_name: "Model Secondary School", location: "Akure, Ondo", email: "info@modelsecondaryschool.com" },
            { school_name: "Watersprings International School", location: "Akure, Ondo", email: "info@waterspringsschool.com.ng" },
            { school_name: "Seaba Model Christian College", location: "Akure, Ondo", email: "info@myseabacollege.org" },
            { school_name: "Impact High School Akure", location: "Akure, Ondo", email: "info@impactschools.org.ng" },
            { school_name: "Christ the Redeemer's Int'l Secondary School", location: "Akure, Ondo", email: "crissakure@gmail.com" },
            { school_name: "Homaj High School", location: "Akure, Ondo", email: "info.homajhighschool@gmail.com" },
        ];
        let schoolList = JSON.parse(JSON.stringify(DEFAULT_SCHOOL_LIST));

        function renderSchool() {
            setPg(`<div style="max-width:860px">
    <div class="scrape-card" style="text-align:left;padding:18px 20px;margin-bottom:14px">
      <p style="margin:0;font-size:.88rem;color:var(--muted);line-height:1.6">Send your <strong style="color:var(--text)">Tech / AI Instructor</strong> cover letter directly to Nigerian private school email addresses. This is <em>independent</em> from the general job-scraping cycle. A 30-day cooldown prevents duplicate sends per email.</p>
    </div>
    <div class="tw" style="margin-bottom:12px">
      <table>
        <thead><tr><th style="width:26px">#</th><th>School Name</th><th style="width:150px">Location</th><th>Email Address</th><th style="width:34px"></th></tr></thead>
        <tbody id="school-tbody">${buildSchoolRows()}</tbody>
      </table>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
      <button class="btn" onclick="addSchoolRow()">+ Add School</button>
      <button class="btn btn-primary" id="sapply-btn" onclick="applyToSchools()">📨 Apply to All (${schoolList.length})</button>
      <button class="btn btn-ghost" onclick="schoolList=JSON.parse(JSON.stringify(DEFAULT_SCHOOL_LIST));renderSchool()" title="Restore default list">↺ Reset</button>
    </div>
    <div id="school-status" style="display:none;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:.84rem;align-items:center;gap:8px"></div>
    <div id="school-results" style="margin-top:12px"></div>
  </div>`);
        }

        function buildSchoolRows() {
            return schoolList.map((s, i) => `<tr id="sr-${i}">
    <td style="color:var(--muted);font-size:.78rem">${i + 1}</td>
    <td><input class="inline-inp" value="${x(s.school_name)}" onchange="schoolList[${i}].school_name=this.value" placeholder="School name" /></td>
    <td><input class="inline-inp" value="${x(s.location)}" onchange="schoolList[${i}].location=this.value" placeholder="City, State" /></td>
    <td><input class="inline-inp" value="${x(s.email)}" onchange="schoolList[${i}].email=this.value" placeholder="email@school.com" /></td>
    <td><button onclick="removeSchoolRow(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem">✕</button></td>
  </tr>`).join('');
        }

        function addSchoolRow() {
            const i = schoolList.length;
            schoolList.push({ school_name: '', location: 'Nigeria', email: '' });
            const tb = document.getElementById('school-tbody');
            if (!tb) { renderSchool(); return; }
            const tr = document.createElement('tr');
            tr.id = `sr-${i}`;
            tr.innerHTML = `
    <td style="color:var(--muted);font-size:.78rem">${i + 1}</td>
    <td><input class="inline-inp" placeholder="School name" onchange="schoolList[${i}].school_name=this.value" /></td>
    <td><input class="inline-inp" placeholder="City, State" value="Nigeria" onchange="schoolList[${i}].location=this.value" /></td>
    <td><input class="inline-inp" placeholder="email@school.com" onchange="schoolList[${i}].email=this.value" /></td>
    <td><button onclick="removeSchoolRow(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem">✕</button></td>`;
            tb.appendChild(tr);
            const btn = document.getElementById('sapply-btn');
            if (btn) btn.textContent = `📨 Apply to All (${schoolList.length})`;
        }

        function removeSchoolRow(i) {
            schoolList.splice(i, 1);
            renderSchool();
        }

        async function applyToSchools() {
            const valid = schoolList.filter(s => s.email.trim() && s.school_name.trim());
            if (!valid.length) { toast('Add at least one school with a name and email', 'err'); return; }
            const btn = document.getElementById('sapply-btn');
            const statusEl = document.getElementById('school-status');
            btn.disabled = true;
            btn.textContent = '⏳ Sending…';
            statusEl.style.display = 'flex';
            statusEl.innerHTML = '<div class="spin"></div>&nbsp;Sending applications — 5 s delay between each send…';
            statusEl.style.color = 'var(--muted)';
            document.getElementById('school-results').innerHTML = '';
            try {
                const res = await api('/schools/apply', { method: 'POST', body: JSON.stringify({ contacts: valid }) });
                statusEl.innerHTML = `✅ Done — <strong>${res.sent}</strong> sent · <strong>${res.skipped}</strong> skipped (cooldown) · <strong>${res.failed}</strong> failed`;
                statusEl.style.color = res.failed > 0 ? 'var(--warn)' : 'var(--ok)';
                const rows = (res.results || []).map(r =>
                    `<tr><td style="font-size:.82rem">${x(r.email)}</td><td><span class="b b-${r.status === 'sent' ? 'sent' : r.status === 'skipped' ? 'pending' : 'failed'}">${r.status}</span></td><td style="color:var(--muted);font-size:.78rem">${x(r.reason || '')}</td></tr>`
                ).join('');
                document.getElementById('school-results').innerHTML = `<div class="tw"><table>
      <thead><tr><th>Email</th><th>Status</th><th>Note</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
                toast(`School outreach complete: ${res.sent} sent`, res.failed > 0 ? 'info' : 'ok');
            } catch (e) {
                statusEl.innerHTML = `❌ ${x(e.message)}`;
                statusEl.style.color = 'var(--err)';
                toast('Error: ' + e.message, 'err');
            } finally {
                btn.disabled = false;
                btn.textContent = `📨 Apply to All (${valid.length})`;
            }
        }

        // ── Utils ──────────────────────────────────────────────────────────────────
        function x(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function fd(iso) { return iso ? new Date(iso).toLocaleString('en-NG', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—'; }

        // ── Boot ───────────────────────────────────────────────────────────────────
        if (S.token) showApp();
    </script>
</body>

</html>
