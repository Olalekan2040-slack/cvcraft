{% extends 'base.html' %}
{% block title %}Subscription — CVCraft{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-10">
    <h1 class="text-3xl font-display font-bold text-white mb-8">Subscription</h1>
    <div class="bg-dark-card border border-dark-border rounded-2xl p-8 shadow-card text-center">
        <div class="w-16 h-16 rounded-2xl bg-gold/20 flex items-center justify-center mx-auto mb-4">

</div>
{% endblock %}
