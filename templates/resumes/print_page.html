<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Print</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #e5e7eb;
            font-family: sans-serif;
        }

        /* Top bar — hidden when printing */
        #print-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: #111520;
            border-bottom: 1px solid #C9A84C33;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        #print-bar .info {
            color: #d1d5db;
            font-size: 14px;
        }

        #print-bar .info strong {
            color: #fff;
        }

        #print-bar .actions {
            display: flex;
            gap: 10px;
        }

        .btn-print {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #C9A84C;
            color: #0A0C0F;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            color: #9ca3af;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #374151;
            text-decoration: none;
        }

        .btn-back:hover {
            color: #fff;
            border-color: #6b7280;
        }

        .tip {
            color: #6b7280;
            font-size: 12px;
        }

        .resume-wrap {
            padding-top: 68px;
            /* height of print bar */
            display: flex;
            justify-content: center;
            padding-bottom: 48px;
        }

        /* When printing: hide bar, remove grey bg, remove padding */
        @media print {
            #print-bar {
                display: none !important;
            }

            body {
                background: white;
            }

            .resume-wrap {
                padding: 0;
                display: block;
            }

            @page {
                size: A4;
                margin: 10mm 0 8mm;
            }

            @page :first {
                margin: 0;
            }
        }
    </style>
</head>

<body>

    <div id="print-bar">
        <div class="info">
            <strong>{{ title }}</strong>
            <span class="tip"> &nbsp;·&nbsp; Click "Save as PDF" in the print dialog for best results</span>
        </div>
        <div class="actions">
            <a href="{{ back_url }}" class="btn-back">← Back</a>
            <button class="btn-print" onclick="window.print()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 6 2 18 2 18 9"></polyline>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                    <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
                Save as PDF
            </button>
        </div>
    </div>

    <div class="resume-wrap">
        {{ resume_html|safe }}
    </div>

    <script>
        // Auto-open print dialog after fonts load
        window.addEventListener('load', function () {
            {% if auto_print %}
            setTimeout(function () { window.print(); }, 600);
            {% endif %}
        });
    </script>

</body>

</html>
